name: Collect Shopee Data

on:
  schedule:
    # 매일 UTC 06:00 (KST 15:00)
    - cron: '0 6 * * *'
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Collect all countries
        run: node scripts/collect.mjs all

      - name: Build site
        run: npm run build

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "📊 Data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
